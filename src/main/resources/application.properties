spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/finalizatcc}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:12345}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Cria pasta para upload de arquivos
file.upload-dir=uploads

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# JWT stateless. Em producao, defina JWT_SECRET no ambiente.
jwt.secret=${JWT_SECRET:dev-finaliza-tcc-change-this-secret-32-bytes-minimum}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Swagger
springdoc.swagger-ui.path=/

